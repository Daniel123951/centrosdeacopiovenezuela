<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centros de Acopio - Sismo Venezuela</title>
    
    <!-- Estilos Premium Integrados (Sin dependencias externas) -->
    <style>
        :root {
            --primary: #dc2626;
            --primary-hover: #b91c1c;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-content: column;
            flex-direction: column;
        }

        /* Banner de Alerta Superior */
        .hero {
            background: linear-gradient(135deg, #7f1d1d 0%, #1e1b4b 100%);
            color: white;
            padding: 3rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid var(--primary);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(220, 38, 38, 0.15) 0%, transparent 80%);
            pointer-events: none;
        }

        .hero h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .hero p {
            font-size: 1rem;
            color: #f1f5f9;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 300;
            line-height: 1.5;
        }

        /* Contenedor Grid Principal */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            flex-grow: 1;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1.1fr 0.9fr;
            }
        }

        /* Estilos de Tarjetas / Paneles */
        .panel {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Formularios */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: #f8fafc;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: white;
            font-weight: 700;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Buscador Lateral */
        .search-box {
            background: #1e293b;
            color: white;
            padding: 1.5rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
        }

        .search-box .panel-title {
            color: white;
            margin-bottom: 1rem;
        }

        .search-box .form-control {
            background-color: #334155;
            border-color: #475569;
            color: white;
        }

        .search-box .form-control:focus {
            background-color: #475569;
            border-color: #ef4444;
        }

        /* Listado de Tarjetas Dinámicas */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 0.25rem;
        }

        /* Tarjeta de Centro de Acopio Individual */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.25rem;
            border: 1px solid var(--border);
            border-left: 5px solid var(--primary);
            box-shadow: var(--shadow);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .badge {
            background-color: #fee2e2;
            color: #991b1b;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            white-space: nowrap;
            border: 1px solid #fca5a5;
        }

        .card-body {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .card-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: #64748b;
        }

        .meta-right {
            text-align: right;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Estado Vacío / Cargando */
        .status-msg {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            font-size: 0.9rem;
        }

        /* Pie de página */
        footer {
            background-color: #0f172a;
            color: #94a3b8;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            margin-top: auto;
            border-top: 1px solid #1e293b;
        }

        footer a {
            color: #ef4444;
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Encabezado de la página -->
    <header class="hero">
        <h1>SOS Venezuela: Centros de Acopio</h1>
        <p>Plataforma solidaria en tiempo real para coordinar la recolección y distribución de suministros tras el sismo del 24 de junio.</p>
    </header>

    <!-- Contenedor Principal -->
    <div class="container">
        
        <!-- Panel Izquierdo: Formulario de Registro -->
        <section class="panel">
            <h2 class="panel-title">📍 Registrar Punto de Recaudación</h2>
            <form id="form-acopio">
                <div class="form-group">
                    <label for="nombre">Nombre de la Institución o Lugar</label>
                    <input type="text" id="nombre" class="form-control" required placeholder="Ej. Bomberos, Centro Parroquial, Centro Comercial...">
                </div>
                
                <div class="form-group">
                    <label for="estado">Estado / Región</label>
                    <select id="estado" class="form-control" required>
                        <option value="">Selecciona una región...</option>
                        <option value="Distrito Capital">Distrito Capital</option>
                        <option value="Anzoátegui">Anzoátegui</option>
                        <option value="Aragua">Aragua</option>
                        <option value="Carabobo">Carabobo</option>
                        <option value="Miranda">Miranda</option>
                        <option value="Sucre">Sucre</option>
                        <option value="Zulia">Zulia</option>
                        <option value="Otros Estados">Otros Estados</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección Detallada</label>
