<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa Solidario Venezuela</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }
  </style>
</head>

<body class="text-white">

  <!-- HEADER -->
  <header class="text-center p-6">
    <h1 class="text-3xl font-bold">🇻🇪 Mapa Solidario Venezuela</h1>
    <p class="text-gray-300 mt-2">Registro de centros de acopio y donaciones</p>
  </header>

  <!-- FORM -->
  <div class="max-w-xl mx-auto bg-white/10 p-6 rounded-xl shadow-lg">
    <h2 class="text-xl font-semibold mb-4">Agregar Centro de Acopio</h2>

    <input id="nombre" class="w-full p-2 mb-2 rounded text-black" placeholder="Nombre del centro">

    <input id="direccion" class="w-full p-2 mb-2 rounded text-black" placeholder="Dirección">

    <input id="telefono" class="w-full p-2 mb-2 rounded text-black" placeholder="Teléfono">

    <input id="ciudad" class="w-full p-2 mb-2 rounded text-black" placeholder="Ciudad / Estado">

    <input id="nota" class="w-full p-2 mb-2 rounded text-black" placeholder="Nota / lo que necesitan">

    <input id="whatsapp" class="w-full p-2 mb-4 rounded text-black" placeholder="WhatsApp (con +58)">

    <button onclick="guardarCentro()"
      class="bg-green-500 hover:bg-green-600 w-full p-2 rounded font-bold">
      Guardar Centro
    </button>
  </div>

  <!-- SEARCH -->
  <div class="max-w-xl mx-auto mt-6">
    <input id="buscar" onkeyup="filtrar()"
      class="w-full p-2 rounded text-black"
      placeholder="Buscar por ciudad, nombre o estado...">
  </div>

  <!-- LIST -->
  <div id="lista" class="max-w-xl mx-auto mt-6 space-y-4"></div>

  <!-- FOOTER -->
  <footer class="text-center mt-10 text-gray-400 text-sm p-6">
    Hecho por: <b>danielmarcelo.info</b>
  </footer>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
